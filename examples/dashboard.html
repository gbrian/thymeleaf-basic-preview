<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title th:text="'Dashboard — ' + ${app.name}">Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: sans-serif; margin: 0; background: #f5f5fa; color: #333; }
    .topbar { background: #1e1e2e; color: #cdd6f4; padding: 0.75rem 2rem; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { margin: 0; font-size: 1.1rem; color: #89b4fa; }
    .topbar .user-info { font-size: 0.85rem; color: #a6adc8; }
    .main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .kpi { background: #fff; border-radius: 10px; padding: 1.25rem; border: 1px solid #e0e0e0; }
    .kpi .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 0.4rem; }
    .kpi .value { font-size: 2rem; font-weight: bold; }
    .kpi .value.up { color: #40a02b; }
    .kpi .value.down { color: #d20f39; }
    .kpi .value.neutral { color: #1e66f5; }
    .section { background: #fff; border-radius: 10px; padding: 1.5rem; border: 1px solid #e0e0e0; margin-bottom: 1.5rem; }
    .section h2 { margin-top: 0; font-size: 1rem; color: #555; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; margin-bottom: 1rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 2px solid #eee; }
    td { padding: 0.6rem 0.75rem; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    tr.even-row { background: #fafafa; }
    .status-pill { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 0.78rem; font-weight: bold; }
    .status-success { background: #a6e3a1; color: #1e1e2e; }
    .status-pending { background: #f9e2af; color: #1e1e2e; }
    .status-failed  { background: #f38ba8; color: #1e1e2e; }
    .alert { border-left: 4px solid #cba6f7; background: #f5f0ff; padding: 0.75rem 1rem; border-radius: 0 6px 6px 0; margin-bottom: 0.75rem; font-size: 0.9rem; }
    .alert.warn { border-color: #fe640b; background: #fff8f0; }
    .alert.error { border-color: #d20f39; background: #fff0f3; }
    .no-alerts { color: #aaa; font-size: 0.9rem; }
    .progress-bar-wrap { background: #eee; border-radius: 6px; height: 10px; overflow: hidden; margin-top: 4px; }
    .progress-bar { height: 10px; border-radius: 6px; background: #89b4fa; }
  </style>
</head>
<body>

  <div class="topbar">
    <h1 th:text="${app.name}">App Dashboard</h1>
    <span class="user-info">
      Logged in as <strong th:text="${currentUser.name}">User</strong>
      &mdash; <span th:text="${currentUser.role}">ROLE</span>
    </span>
  </div>

  <div class="main">

    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi" th:each="kpi : ${kpis}">
        <div class="label" th:text="${kpi.label}">Metric</div>
        <div class="value" th:classappend="${kpi.trend}" th:text="${kpi.value}">0</div>
      </div>
    </div>

    <!-- Recent Orders Table -->
    <div class="section">
      <h2>Recent Orders</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Order ID</th>
            <th>Customer</th>
            <th>Amount</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="order, stat : ${orders}" th:classappend="${stat.odd} ? 'even-row' : ''">
            <td th:text="${stat.count}">1</td>
            <td th:text="${order.id}">ORD-000</td>
            <td th:text="${order.customer}">Customer Name</td>
            <td th:text="'$' + ${order.amount}">$0.00</td>
            <td>
              <span
                class="status-pill"
                th:classappend="${order.status == 'SUCCESS'} ? 'status-success' : (${order.status == 'PENDING'} ? 'status-pending' : 'status-failed')"
                th:text="${order.status}"
              >STATUS</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Server Health -->
    <div class="section">
      <h2>Server Health</h2>
      <div th:each="server : ${servers}" style="margin-bottom:1.25rem;">
        <div style="display:flex;justify-content:space-between;font-size:0.9rem;">
          <strong th:text="${server.name}">server-name</strong>
          <span th:text="${server.load} + '% CPU'">0% CPU</span>
        </div>
        <div class="progress-bar-wrap">
          <div
            class="progress-bar"
            th:style="'width:' + ${server.load} + '%;background:' + (${server.load > 80} ? '#f38ba8' : (${server.load > 50} ? '#f9e2af' : '#89b4fa'))"
          ></div>
        </div>
        <div style="font-size:0.78rem;color:#888;margin-top:3px;" th:text="${server.region}">Region</div>
      </div>
    </div>

    <!-- System Alerts -->
    <div class="section">
      <h2>System Alerts</h2>
      <div th:if="${alerts.size() == 0}" class="no-alerts">✅ No active alerts. All systems nominal.</div>
      <div
        th:each="alert : ${alerts}"
        class="alert"
        th:classappend="${alert.level == 'warn'} ? 'warn' : (${alert.level == 'error'} ? 'error' : '')"
      >
        <strong th:text="${alert.level.toUpperCase()}">INFO</strong> —
        <span th:text="${alert.message}">Alert message</span>
      </div>
    </div>

  </div>

</body>
</html>
