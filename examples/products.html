<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8" />
  <title th:text="${catalog.title}">Product Catalog</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; color: #333; }
    h1 { margin-bottom: 0.25rem; }
    .subtitle { color: #888; margin-bottom: 2rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
    .product-card { border: 1px solid #ddd; border-radius: 10px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .product-card.featured { border-color: #f9e2af; background: #fffbf0; }
    .product-card.out-of-stock { opacity: 0.55; }
    .product-name { font-size: 1.1rem; font-weight: bold; }
    .product-price { font-size: 1.25rem; color: #1e66f5; font-weight: bold; }
    .product-price.discounted { color: #d20f39; }
    .original-price { text-decoration: line-through; color: #aaa; font-size: 0.9rem; }
    .category { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    .stock-ok { color: #40a02b; font-size: 0.85rem; }
    .stock-low { color: #fe640b; font-size: 0.85rem; font-weight: bold; }
    .stock-none { color: #d20f39; font-size: 0.85rem; font-weight: bold; }
    .badge-featured { display: inline-block; background: #f9e2af; color: #1e1e2e; border-radius: 4px; padding: 1px 7px; font-size: 0.75rem; font-weight: bold; }
    .index-label { font-size: 0.7rem; color: #bbb; }
    .summary { margin-top: 2rem; padding: 1rem; background: #f5f5fa; border-radius: 8px; }
    .summary span { font-weight: bold; }
  </style>
</head>
<body>

  <h1 th:text="${catalog.title}">Product Catalog</h1>
  <p class="subtitle" th:text="${catalog.description}">Browse our selection.</p>

  <div class="grid">
    <div
      class="product-card"
      th:each="product, stat : ${catalog.products}"
      th:classappend="${product.featured} ? 'featured' : '' + (${product.stock == 0} ? ' out-of-stock' : '')"
    >
      <span class="index-label" th:text="'#' + ${stat.count} + ' of ' + ${stat.size}">#1 of N</span>

      <span class="badge-featured" th:if="${product.featured}">⭐ Featured</span>

      <p class="category" th:text="${product.category}">Category</p>
      <p class="product-name" th:text="${product.name}">Product Name</p>
      <p th:text="${product.description}">Short description of the product.</p>

      <div>
        <span class="original-price" th:if="${product.originalPrice}" th:text="'$' + ${product.originalPrice}">$0.00</span>
        <span
          class="product-price"
          th:classappend="${product.originalPrice} ? 'discounted' : ''"
          th:text="'$' + ${product.price}"
        >$0.00</span>
      </div>

      <div th:switch="${product.stock}">
        <p class="stock-none" th:case="0">❌ Out of stock</p>
        <p class="stock-low"  th:if="${product.stock > 0 and product.stock <= 5}">⚠️ Only <strong th:text="${product.stock}">N</strong> left!</p>
        <p class="stock-ok"   th:unless="${product.stock <= 5}">✅ In stock (<span th:text="${product.stock}">N</span> available)</p>
      </div>
    </div>
  </div>

  <div class="summary">
    Total products: <span th:text="${catalog.products.size()}">0</span> &mdash;
    Catalog: <span th:text="${catalog.title}">N/A</span>
  </div>

</body>
</html>
